<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Organelas - Geometrias Matematicas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a1a2a 100%);
            color: #fff;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 255, 200, 0.2);
        }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #00ffc8, #00a8ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: #88ccff; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .organelle-card {
            background: rgba(20, 30, 50, 0.8);
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .organelle-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 255, 200, 0.2);
        }
        .canvas-container {
            height: 260px;
            background: radial-gradient(ellipse at center, #1a2a4a 0%, #0a0a1a 100%);
        }
        .organelle-info { padding: 20px; }
        .organelle-info h3 {
            color: #00ffc8;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        .organelle-info p {
            color: #aaccff;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .math-formula {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: #ffcc00;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls button {
            background: linear-gradient(135deg, #00ffc8, #00a8ff);
            border: none;
            padding: 6px 14px;
            border-radius: 15px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        .controls input[type="range"] { flex: 1; min-width: 80px; }
        .param-label {
            color: #88ccff;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #667;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer a { color: #00ffc8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Galeria de Organelas Celulares</h1>
        <p>Visualizacao 3D baseada em expressoes matematicas</p>
    </div>

    <div class="gallery" id="gallery"></div>

    <div class="footer">
        <p>Bioinformatics Hub | <a href="index.html">Voltar ao Hub</a></p>
    </div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/OrganelleGeometry.js"></script>

    <script>
        const organelles = [
            {
                id: 'nucleus', name: 'Nucleo', icon: '🟣',
                description: 'Centro de controle. Esfera com deformacao por Simplex Noise.',
                formula: 'r(θ,φ) = R₀ + A·noise3D(x,y,z)',
                create: (p) => OrganelleGeometry.createNucleus(1, 4, 2, p.noise || 0.15),
                material: { color: 0x9966ff, emissive: 0x330066, transparent: true, opacity: 0.85 },
                params: [{ name: 'noise', label: 'Ruido', min: 0, max: 0.3, default: 0.15 }]
            },
            {
                id: 'mitochondria', name: 'Mitocondria', icon: '🟠',
                description: 'Usina de energia (ATP). Capsula com curvatura natural.',
                formula: 'Tubo(spline) + curvatura senoidal',
                create: (p) => OrganelleGeometry.createMitochondria(2, 0.3, p.curve || 0.3),
                material: { color: 0xff6633, emissive: 0x331100 },
                params: [{ name: 'curve', label: 'Curvatura', min: 0, max: 0.5, default: 0.3 }]
            },
            {
                id: 'chloroplast', name: 'Cloroplasto', icon: '🟢',
                description: 'Fotossintese. Elipsoide oblato (forma de lente).',
                formula: 'x²/a² + y²/a² + z²/c² = 1',
                create: (p) => OrganelleGeometry.createChloroplast(1.2, p.thick || 0.4),
                material: { color: 0x33cc66, emissive: 0x003311 },
                params: [{ name: 'thick', label: 'Espessura', min: 0.2, max: 1, default: 0.4 }]
            },
            {
                id: 'vacuole', name: 'Vacuolo Central', icon: '🔵',
                description: 'Ocupa 80-90% da celula. Esfera com ruido multi-frequencia.',
                formula: 'r = R₀·(1 + Σ noiseₙ·2⁻ⁿ)',
                create: (p) => OrganelleGeometry.createVacuole(1.5, p.irreg || 0.15),
                material: { color: 0x3399ff, emissive: 0x001133, transparent: true, opacity: 0.6 },
                params: [{ name: 'irreg', label: 'Irregularidade', min: 0, max: 0.3, default: 0.15 }]
            },
            {
                id: 'dna', name: 'DNA (Dupla Helice)', icon: '🧬',
                description: 'Material genetico. Duas espirais parametricas.',
                formula: 'x=r·cos(ωt), y=r·sin(ωt), z=v·t',
                create: (p) => OrganelleGeometry.createDNAHelix(p.turns || 3, 0.4, 0.8, 0.04),
                material: { color: 0xff3399, emissive: 0x330011 },
                isGroup: true,
                params: [{ name: 'turns', label: 'Voltas', min: 1, max: 6, default: 3, step: 1 }]
            },
            {
                id: 'golgi', name: 'Complexo de Golgi', icon: '📦',
                description: 'Processa proteinas. Pilha de cisternas curvadas.',
                formula: 'z(x,y) = A·(1 - x²/a² - y²/b²)',
                create: (p) => OrganelleGeometry.createGolgi(p.layers || 6, 1.2),
                material: { color: 0xffcc33, emissive: 0x332200, side: THREE.DoubleSide },
                isGroup: true,
                params: [{ name: 'layers', label: 'Camadas', min: 3, max: 10, default: 6, step: 1 }]
            },
            {
                id: 'er', name: 'Reticulo Endoplasmatico', icon: '🌐',
                description: 'Rede de membranas. Gerado por L-System.',
                formula: 'F → F[+F][-F]F[^F]',
                create: (p) => OrganelleGeometry.createER(p.iter || 2, 0.25, 0.025),
                material: { color: 0x66ccff, emissive: 0x003366 },
                isGroup: true,
                params: [{ name: 'iter', label: 'Complexidade', min: 1, max: 3, default: 2, step: 1 }]
            },
            {
                id: 'membrane', name: 'Membrana Plasmatica', icon: '🫧',
                description: 'Barreira seletiva. Superficie com ondulacoes.',
                formula: 'z = noise(x,y) + 0.3·noise(2x,2y)',
                create: (p) => OrganelleGeometry.createMembrane(3, 3, p.wave || 0.15),
                material: { color: 0xffaa66, emissive: 0x331100, transparent: true, opacity: 0.7, side: THREE.DoubleSide },
                params: [{ name: 'wave', label: 'Ondulacao', min: 0, max: 0.4, default: 0.15 }]
            }
        ];

        const scenes = {}, renderers = {}, cameras = {}, controls = {}, meshes = {};

        function createGallery() {
            const gallery = document.getElementById('gallery');
            organelles.forEach(org => {
                const card = document.createElement('div');
                card.className = 'organelle-card';
                card.innerHTML = `
                    <div class="canvas-container" id="canvas-${org.id}"></div>
                    <div class="organelle-info">
                        <h3>${org.icon} ${org.name}</h3>
                        <p>${org.description}</p>
                        <div class="math-formula">${org.formula}</div>
                        <div class="controls" id="controls-${org.id}">
                            ${org.params.map(p => `
                                <div class="param-label">${p.label}:
                                    <input type="range" id="param-${org.id}-${p.name}"
                                           min="${p.min}" max="${p.max}" value="${p.default}"
                                           step="${p.step || 0.01}" data-org="${org.id}" data-param="${p.name}">
                                </div>
                            `).join('')}
                            <button onclick="resetOrganelle('${org.id}')">Reset</button>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
                setTimeout(() => initThreeJS(org), 100);
            });

            document.querySelectorAll('input[type="range"]').forEach(input => {
                input.addEventListener('input', e => updateOrganelle(e.target.dataset.org));
            });
        }

        function initThreeJS(org) {
            const container = document.getElementById(`canvas-${org.id}`);
            const width = container.clientWidth, height = container.clientHeight;

            const scene = new THREE.Scene();
            scenes[org.id] = scene;

            const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
            camera.position.z = 4;
            cameras[org.id] = camera;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            renderers[org.id] = renderer;

            const ctrl = new THREE.OrbitControls(camera, renderer.domElement);
            ctrl.enableDamping = true;
            ctrl.autoRotate = true;
            ctrl.autoRotateSpeed = 1;
            controls[org.id] = ctrl;

            scene.add(new THREE.AmbientLight(0x404040, 0.5));
            const light1 = new THREE.PointLight(0xffffff, 1);
            light1.position.set(5, 5, 5);
            scene.add(light1);
            const light2 = new THREE.PointLight(0x00ffcc, 0.5);
            light2.position.set(-5, -5, 5);
            scene.add(light2);

            createOrganelleMesh(org);
        }

        function createOrganelleMesh(org) {
            const scene = scenes[org.id];
            if (meshes[org.id]) {
                scene.remove(meshes[org.id]);
                if (meshes[org.id].geometry) meshes[org.id].geometry.dispose();
            }

            const params = {};
            org.params.forEach(p => {
                const input = document.getElementById(`param-${org.id}-${p.name}`);
                if (input) params[p.name] = parseFloat(input.value);
            });

            const result = org.create(params);
            const material = new THREE.MeshStandardMaterial(org.material);

            let mesh;
            if (org.isGroup) {
                mesh = result;
                mesh.traverse(child => { if (child.isMesh) child.material = material; });
            } else {
                mesh = new THREE.Mesh(result, material);
            }

            scene.add(mesh);
            meshes[org.id] = mesh;
        }

        function updateOrganelle(orgId) {
            const org = organelles.find(o => o.id === orgId);
            if (org) createOrganelleMesh(org);
        }

        function resetOrganelle(orgId) {
            const org = organelles.find(o => o.id === orgId);
            if (!org) return;
            org.params.forEach(p => {
                const input = document.getElementById(`param-${orgId}-${p.name}`);
                if (input) input.value = p.default;
            });
            createOrganelleMesh(org);
        }

        function animate() {
            requestAnimationFrame(animate);
            Object.keys(controls).forEach(id => controls[id].update());
            Object.keys(renderers).forEach(id => renderers[id].render(scenes[id], cameras[id]));
        }

        window.addEventListener('resize', () => {
            Object.keys(renderers).forEach(id => {
                const container = document.getElementById(`canvas-${id}`);
                const w = container.clientWidth, h = container.clientHeight;
                cameras[id].aspect = w / h;
                cameras[id].updateProjectionMatrix();
                renderers[id].setSize(w, h);
            });
        });

        createGallery();
        animate();
    </script>
</body>
</html>
